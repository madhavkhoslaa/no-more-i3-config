background {
    monitor =
    path = /home/vroomer/Downloads/chess-gate.jpeg
    blur_passes = 3
    blur_size = 8
    contrast = 0.8
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.1
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(89, 180, 250, 0.8)
    inner_color = rgba(30, 30, 46, 0.4)
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = false
    placeholder_text = <i>Unlock...</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

